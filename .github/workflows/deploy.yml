name: Deploy SSO to VPS

on:
  push:
    branches:
      - main
    # Deploy hanya akan berjalan jika ada perubahan pada folder BE, FE, atau docker-compose.yml
    paths:
      - "BE/**"
      - "FE/**"
      - "docker-compose.yml"

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Executing remote ssh commands to deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }} # Biasanya 22
          script: |
            # Menggunakan folder staging sesuai standar
            export APP_DIR="/home/deploy/apps/sso-staging"

            # Idempotent Setup: Clone if not exists, pull if does
            if [ ! -d "$APP_DIR" ]; then
                echo "Directory $APP_DIR does not exist. Cloning repository..."
                mkdir -p /home/deploy/apps
                cd /home/deploy/apps
                git clone -b staging https://github.com/ac4bfg/sso.git sso-staging
                cd sso-staging
            else
                echo "Directory $APP_DIR exists. Pulling latest shifts..."
                cd "$APP_DIR"
                git pull origin staging
            fi

            # Proactive Cleanup to avoid "No space left on device"
            echo "Cleaning up unused Docker resources..."
            docker system prune -af

            # Build and deploy with removal of orphans
            echo "Building and starting containers..."
            docker-compose up -d --build --remove-orphans

            # Verify deployment
            echo "Verifying running containers..."
            docker ps | grep sso
