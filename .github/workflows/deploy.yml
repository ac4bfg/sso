name: Deploy SSO to VPS

on:
  push:
    branches:
      - main
    # Deploy hanya akan berjalan jika ada perubahan pada folder BE, FE, atau docker-compose.yml
    paths:
      - "BE/**"
      - "FE/**"
      - "docker-compose.yml"

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy SSO
        run: |
          # Menggunakan folder sesuai dokumen serah terima
          export APP_DIR="/home/deploy/apps/sso"

          # Idempotent Setup: Clone if not exists, pull if does
          if [ ! -d "$APP_DIR" ]; then
              echo "Directory $APP_DIR does not exist. Cloning repository..."
              mkdir -p /home/deploy/apps
              cd /home/deploy/apps
              git clone https://github.com/ac4bfg/sso.git
              cd sso
          else
              echo "Directory $APP_DIR exists. Pulling latest shifts..."
              cd "$APP_DIR"
              git pull origin main
          fi

          # Smart Cleanup: Preserve build cache, only remove dangling images
          echo "Cleaning up unused Docker images..."
          docker image prune -f

          # Build and deploy with removal of orphans
          echo "Building and starting containers..."
          docker-compose up -d --build --remove-orphans

          # Verify deployment
          echo "Verifying running containers..."
          docker ps | grep sso
