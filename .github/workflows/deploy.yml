name: Deploy SSO to VPS

on:
  push:
    branches:
      - main
    # Deploy hanya akan berjalan jika ada perubahan pada folder BE, FE, atau docker-compose.yml
    paths:
      - "BE/**"
      - "FE/**"
      - "docker-compose.yml"

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Executing remote ssh commands to deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }} # Biasanya 22
          script: |
            APP_DIR="/home/deploy/apps/sso"
            REPO_URL="https://github.com/ac4bfg/sso.git"

            # 1. Cek apakah folder sudah ada dan merupakan repository git
            if [ ! -d "$APP_DIR/.git" ]; then
              echo "Folder tidak ditemukan, melakukan clone pertama kali..."
              mkdir -p /home/deploy/apps
              cd /home/deploy/apps
              git clone $REPO_URL sso
              cd sso
            else
              echo "Folder ditemukan, melakukan pull kode terbaru..."
              cd $APP_DIR
              git fetch --all
              git reset --hard origin/main
            fi

            # 2. Bersihkan sampah Docker SEBELUM build untuk mencegah disk penuh (No space left on device)
            echo "Membersihkan sampah Docker lama..."
            docker system prune -f

            # 3. Build dan Jalankan
            echo "Memulai proses build dan restart container..."
            docker-compose up -d --build

            # 4. Bersihkan image 'dangling' setelah build selesai
            docker image prune -f
            echo "Deployment berhasil!"
