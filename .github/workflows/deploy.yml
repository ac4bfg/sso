name: Deploy SSO to VPS

on:
  push:
    branches:
      - main
    paths:
      - "BE/**"
      - "FE/**"
      - "docker-compose.yml"
      - ".github/workflows/**"

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy SSO
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          SEED_ADMIN_EMAIL: ${{ secrets.SEED_ADMIN_EMAIL }}
          SEED_ADMIN_PASSWORD: ${{ secrets.SEED_ADMIN_PASSWORD }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        run: |
          export APP_DIR="/home/deploy/apps/sso"

          if [ -d "$APP_DIR/.git" ]; then
              echo "Git repo exists. Pulling latest changes..."
              cd "$APP_DIR"
              git pull origin main
          else
              echo "Not a git repo. Cloning fresh..."
              rm -rf "$APP_DIR"
              mkdir -p /home/deploy/apps
              cd /home/deploy/apps
              git clone https://github.com/ac4bfg/sso.git sso
              cd "$APP_DIR"
          fi

          # Tulis .env dari secrets (selalu update tiap deploy)
          {
            echo "JWT_SECRET=${JWT_SECRET}"
            echo "DB_PASSWORD=${DB_PASSWORD}"
            echo "SEED_ADMIN_EMAIL=${SEED_ADMIN_EMAIL}"
            echo "SEED_ADMIN_PASSWORD=${SEED_ADMIN_PASSWORD}"
            echo "GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}"
            echo "GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}"
            echo "DB_HOST_PORT=5432"
            echo "REDIS_HOST_PORT=6379"
            echo "BE_HOST_PORT=8081"
            echo "FE_HOST_PORT=3001"
            echo "CORS_ORIGINS=https://sso.ptkiansantang.com,https://cost-control.ptkiansantang.com,https://invoice.ptkiansantang.com,https://procurement.ptkiansantang.com"
            echo "COOKIE_DOMAIN=.ptkiansantang.com"
            echo "COOKIE_SECURE=true"
            echo "FRONTEND_URL=https://sso.ptkiansantang.com"
            echo "GOOGLE_REDIRECT_URL=https://sso.ptkiansantang.com/api/auth/google/callback"
            echo "NEXT_PUBLIC_SSO_URL=https://sso.ptkiansantang.com"
            echo "NEXT_PUBLIC_API_URL=https://sso.ptkiansantang.com/api"
            echo "NEXT_PUBLIC_DEFAULT_APP_URL=https://cost-control.ptkiansantang.com"
            echo "APP_URL_COST_CONTROL=https://cost-control.ptkiansantang.com"
            echo "APP_URL_INVOICE=https://invoice.ptkiansantang.com"
            echo "APP_URL_PROCUREMENT=https://procurement.ptkiansantang.com"
          } > "$APP_DIR/.env"

          cd "$APP_DIR"

          echo "Cleaning up unused Docker images..."
          docker image prune -f

          echo "Building and starting containers..."
          export DOCKER_BUILDKIT=1
          export COMPOSE_DOCKER_CLI_BUILD=1

          docker compose up -d --build --remove-orphans

          echo "Verifying running containers..."
          docker ps | grep sso
