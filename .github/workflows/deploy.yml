name: Deploy SSO to VPS

on:
  push:
    branches:
      - main
    paths:
      - "BE/**"
      - "FE/**"
      - "docker-compose.yml"
      - ".github/workflows/**"

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy SSO
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          SEED_ADMIN_EMAIL: ${{ secrets.SEED_ADMIN_EMAIL }}
          SEED_ADMIN_PASSWORD: ${{ secrets.SEED_ADMIN_PASSWORD }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        run: |
          export APP_DIR="/home/deploy/apps/sso"

          if [ ! -d "$APP_DIR" ]; then
              echo "Directory $APP_DIR does not exist. Cloning repository..."
              mkdir -p /home/deploy/apps
              cd /home/deploy/apps
              git clone https://github.com/ac4bfg/sso.git
              cd sso
          else
              echo "Directory $APP_DIR exists. Pulling latest changes..."
              cd "$APP_DIR"
              git pull origin main
          fi

          echo "Cleaning up unused Docker images..."
          docker image prune -f

          echo "Building and starting containers..."
          export DOCKER_BUILDKIT=1
          export COMPOSE_DOCKER_CLI_BUILD=1

          # Port mapping
          export DB_HOST_PORT=5432
          export REDIS_HOST_PORT=6379
          export BE_HOST_PORT=8081
          export FE_HOST_PORT=3001

          # URLs (Nginx menangani HTTPS, tidak perlu port eksplisit)
          export NEXT_PUBLIC_SSO_URL=https://sso.ptkiansantang.com
          export NEXT_PUBLIC_API_URL=https://sso.ptkiansantang.com/api
          export NEXT_PUBLIC_DEFAULT_APP_URL=https://cost-control.ptkiansantang.com

          # Backend config
          export CORS_ORIGINS=https://sso.ptkiansantang.com,https://cost-control.ptkiansantang.com,https://invoice.ptkiansantang.com,https://procurement.ptkiansantang.com
          export COOKIE_DOMAIN=.ptkiansantang.com
          export COOKIE_SECURE=true
          export FRONTEND_URL=https://sso.ptkiansantang.com
          export GOOGLE_REDIRECT_URL=https://sso.ptkiansantang.com/api/auth/google/callback

          # App URLs untuk waffle menu seed
          export APP_URL_COST_CONTROL=https://cost-control.ptkiansantang.com
          export APP_URL_INVOICE=https://invoice.ptkiansantang.com
          export APP_URL_PROCUREMENT=https://procurement.ptkiansantang.com

          docker compose up -d --build --remove-orphans

          echo "Verifying running containers..."
          docker ps | grep sso
