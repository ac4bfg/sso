name: Deploy SSO to Staging VPS

on:
  push:
    branches:
      - staging
    paths:
      - "BE/**"
      - "FE/**"
      - "docker-compose.yml"
      - ".github/workflows/**"

jobs:
  deploy:
    name: Deploy to Staging VPS
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy SSO Staging
        env:
          JWT_SECRET: ${{ secrets.STAGING_JWT_SECRET }}
          DB_PASSWORD: ${{ secrets.STAGING_DB_PASSWORD }}
          SEED_ADMIN_EMAIL: ${{ secrets.SEED_ADMIN_EMAIL }}
          SEED_ADMIN_PASSWORD: ${{ secrets.STAGING_SEED_ADMIN_PASSWORD }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        run: |
          export APP_DIR="/home/deploy/apps/sso-staging"

          if [ -d "$APP_DIR/.git" ]; then
              echo "Git repo exists. Pulling latest changes..."
              cd "$APP_DIR"
              git pull origin staging
          else
              echo "Not a git repo. Cloning fresh..."
              rm -rf "$APP_DIR"
              mkdir -p /home/deploy/apps
              cd /home/deploy/apps
              git clone -b staging https://github.com/ac4bfg/sso.git sso-staging
              cd "$APP_DIR"
          fi

          # Tulis .env dari secrets (selalu update tiap deploy)
          cat > "$APP_DIR/.env" << EOF
JWT_SECRET=${JWT_SECRET}
DB_PASSWORD=${DB_PASSWORD}
SEED_ADMIN_EMAIL=${SEED_ADMIN_EMAIL}
SEED_ADMIN_PASSWORD=${SEED_ADMIN_PASSWORD}
GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
DB_HOST_PORT=5433
REDIS_HOST_PORT=6380
BE_HOST_PORT=8082
FE_HOST_PORT=3002
CORS_ORIGINS=https://sso-staging.ptkiansantang.com,http://localhost:3000,http://localhost:3002
COOKIE_DOMAIN=.ptkiansantang.com
COOKIE_SECURE=true
FRONTEND_URL=https://sso-staging.ptkiansantang.com
GOOGLE_REDIRECT_URL=https://sso-staging.ptkiansantang.com/api/auth/google/callback
NEXT_PUBLIC_SSO_URL=https://sso-staging.ptkiansantang.com
NEXT_PUBLIC_API_URL=https://sso-staging.ptkiansantang.com/api
NEXT_PUBLIC_DEFAULT_APP_URL=https://sso-staging.ptkiansantang.com/dashboard
APP_URL_COST_CONTROL=http://localhost:3000
APP_URL_INVOICE=http://localhost:3002
APP_URL_PROCUREMENT=http://localhost:3003
EOF

          cd "$APP_DIR"

          echo "Cleaning up unused Docker images..."
          docker image prune -f

          echo "Building and starting containers..."
          export DOCKER_BUILDKIT=1
          export COMPOSE_DOCKER_CLI_BUILD=1

          docker compose up -d --build --remove-orphans

          echo "Verifying running containers..."
          docker ps | grep sso
