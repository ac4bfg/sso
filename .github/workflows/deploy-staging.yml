name: Deploy SSO to Staging VPS

on:
  push:
    branches:
      - staging
    # Deploy hanya akan berjalan jika ada perubahan pada folder BE, FE, atau docker-compose.yml
    paths:
      - "BE/**"
      - "FE/**"
      - "docker-compose.yml"

jobs:
  deploy:
    name: Deploy to Staging VPS
    runs-on: ubuntu-latest

    steps:
      - name: Executing remote ssh commands to deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_VPS_HOST }}
          username: ${{ secrets.STAGING_VPS_USERNAME }}
          key: ${{ secrets.STAGING_VPS_SSH_KEY }}
          port: ${{ secrets.STAGING_VPS_PORT }} # Biasanya 22
          script: |
            # Menggunakan folder staging sesuai standar user deploy
            mkdir -p /home/deploy/apps/sso-staging
            cd /home/deploy/apps/sso-staging

            # Pastikan sedang di branch staging
            git checkout staging

            # Tarik kode terbaru dari GitHub branch staging
            git pull origin staging

            # Matikan container lama (opsional, tapi disarankan untuk fresh start)
            docker-compose down

            # Build ulang dan jalankan container yang baru
            docker-compose up -d --build

            # Hapus image/container lama yang tidak terpakai untuk menghemat disk VPS
            docker image prune -f
