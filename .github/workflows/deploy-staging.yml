name: Deploy SSO to Staging VPS

on:
  push:
    branches:
      - staging
    # Deploy hanya akan berjalan jika ada perubahan pada folder BE, FE, atau docker-compose.yml
    paths:
      - "BE/**"
      - "FE/**"
      - "docker-compose.yml"

jobs:
  deploy:
    name: Deploy to Staging VPS
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy SSO Staging
        run: |
          # Menggunakan folder staging sesuai standar
          export APP_DIR="/home/deploy/apps/sso-staging"

          # Idempotent Setup: Clone if not exists, pull if does
          if [ ! -d "$APP_DIR" ]; then
              echo "Directory $APP_DIR does not exist. Cloning repository..."
              mkdir -p /home/deploy/apps
              cd /home/deploy/apps
              git clone -b staging https://github.com/ac4bfg/sso.git sso-staging
              cd sso-staging
          else
              echo "Directory $APP_DIR exists. Pulling latest shifts..."
              cd "$APP_DIR"
              git pull origin staging
          fi

          # Smart Cleanup: Preserve build cache, only remove dangling images
          echo "Cleaning up unused Docker images..."
          docker image prune -f

          # Build and deploy with BuildKit enabled for caching
          echo "Building and starting containers using BuildKit..."
          export DOCKER_BUILDKIT=1
          export COMPOSE_DOCKER_CLI_BUILD=1
          docker-compose up -d --build --remove-orphans

          # Verify deployment
          echo "Verifying running containers..."
          docker ps | grep sso
