name: Deploy SSO to Staging VPS

on:
  push:
    branches:
      - staging
    paths:
      - "BE/**"
      - "FE/**"
      - "docker-compose.yml"
      - ".github/workflows/**"

jobs:
  deploy:
    name: Deploy to Staging VPS
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy SSO Staging
        env:
          JWT_SECRET: ${{ secrets.STAGING_JWT_SECRET }}
          DB_PASSWORD: ${{ secrets.STAGING_DB_PASSWORD }}
          SEED_ADMIN_EMAIL: ${{ secrets.SEED_ADMIN_EMAIL }}
          SEED_ADMIN_PASSWORD: ${{ secrets.STAGING_SEED_ADMIN_PASSWORD }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        run: |
          export APP_DIR="/home/deploy/apps/sso-staging"

          if [ -d "$APP_DIR/.git" ]; then
              echo "Git repo exists. Pulling latest changes..."
              cd "$APP_DIR"
              git pull origin staging
          else
              echo "Not a git repo. Cloning fresh..."
              if [ -f "$APP_DIR/.env" ]; then
                  cp "$APP_DIR/.env" /tmp/sso-staging-env-backup
              fi
              rm -rf "$APP_DIR"
              mkdir -p /home/deploy/apps
              cd /home/deploy/apps
              git clone -b staging https://github.com/ac4bfg/sso.git sso-staging
              if [ -f /tmp/sso-staging-env-backup ]; then
                  cp /tmp/sso-staging-env-backup "$APP_DIR/.env"
                  rm /tmp/sso-staging-env-backup
              fi
              cd "$APP_DIR"
          fi

          echo "Cleaning up unused Docker images..."
          docker image prune -f

          echo "Building and starting containers..."
          export DOCKER_BUILDKIT=1
          export COMPOSE_DOCKER_CLI_BUILD=1

          # Port berbeda dari production agar tidak konflik di server yang sama
          export DB_HOST_PORT=5433
          export REDIS_HOST_PORT=6380
          export BE_HOST_PORT=8082
          export FE_HOST_PORT=3002

          # URLs staging — pakai subdomain staging
          export NEXT_PUBLIC_SSO_URL=https://sso-staging.ptkiansantang.com
          export NEXT_PUBLIC_API_URL=https://sso-staging.ptkiansantang.com/api
          export NEXT_PUBLIC_DEFAULT_APP_URL=https://sso-staging.ptkiansantang.com/dashboard

          # Backend config staging
          export CORS_ORIGINS=https://sso-staging.ptkiansantang.com,http://localhost:3000,http://localhost:3002
          export COOKIE_DOMAIN=.ptkiansantang.com
          export COOKIE_SECURE=true
          export FRONTEND_URL=https://sso-staging.ptkiansantang.com
          export GOOGLE_REDIRECT_URL=https://sso-staging.ptkiansantang.com/api/auth/google/callback

          # App URLs untuk waffle menu seed (staging — sistem lain masih dev lokal)
          export APP_URL_COST_CONTROL=http://localhost:3000
          export APP_URL_INVOICE=http://localhost:3002
          export APP_URL_PROCUREMENT=http://localhost:3003

          docker compose up -d --build --remove-orphans

          echo "Verifying running containers..."
          docker ps | grep sso
