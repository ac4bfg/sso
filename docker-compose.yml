# SSO Configuration - Updated build logic
version: '3.8'

x-env-mapping: &env-mapping
  PORT: 8080
  DB_HOST: postgres
  DB_PORT: 5432
  DB_USER: ${DB_USER:-postgres}
  DB_PASSWORD: ${DB_PASSWORD:-postgres}
  DB_NAME: ${DB_NAME:-sso}
  DB_SSLMODE: disable
  REDIS_HOST: redis
  REDIS_PORT: 6379
  REDIS_PASSWORD: ""
  REDIS_DB: 0
  JWT_SECRET: ${JWT_SECRET:-supersecretjwtkeymustbeatleast32chars}
  JWT_ACCESS_EXPIRY: 15m
  JWT_REFRESH_EXPIRY: 168h
  CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:3001}
  COOKIE_DOMAIN: ${COOKIE_DOMAIN:-localhost}
  COOKIE_SECURE: ${COOKIE_SECURE:-false}
  FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3001}
  GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
  GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
  GOOGLE_REDIRECT_URL: ${GOOGLE_REDIRECT_URL:-http://localhost:8081/api/auth/google/callback}
  SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@ksm.co.id}
  SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-admin123}
  SEED_ADMIN_NAME: ${SEED_ADMIN_NAME:-Administrator}
  APP_URL_COST_CONTROL: ${APP_URL_COST_CONTROL:-http://localhost:3000}
  APP_URL_INVOICE: ${APP_URL_INVOICE:-http://localhost:3003}
  APP_URL_PROCUREMENT: ${APP_URL_PROCUREMENT:-http://localhost:3002}

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-sso}
    ports:
      - "${DB_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    restart: unless-stopped

  sso-be:
    build:
      context: ./BE
      dockerfile: Dockerfile
    ports:
      - "${BE_HOST_PORT:-8081}:8080"
    environment:
      <<: *env-mapping
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  sso-fe:
    build:
      context: ./FE
      dockerfile: Dockerfile
    ports:
      - "${FE_HOST_PORT:-3001}:3001"
    environment:
      - NEXT_PUBLIC_SSO_URL=${NEXT_PUBLIC_SSO_URL:-http://localhost:3001}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8081/api}
    depends_on:
      - sso-be
    restart: unless-stopped

volumes:
  postgres_data:
